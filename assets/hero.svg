<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FBC02D"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="25" fill="url(#bg)"/>

  <circle cx="1040" cy="60" r="180" fill="#FFD54F" opacity="0.08"/>
  <circle cx="150" cy="260" r="130" fill="#FBC02D" opacity="0.08"/>

  <rect x="60" y="45" width="6" height="230" rx="5" fill="url(#yellow)"/>

  <text x="90" y="95"
        font-size="44"
        font-family="Segoe UI"
        font-weight="700"
        fill="#FFFFFF">
        👋 Hey, I'm Simran Jaiswal
  </text>

  <text x="92" y="140"
        font-size="26"
        font-family="Segoe UI"
        fill="#FFD54F">
        Software Developer @ Optum
  </text>

  <text x="92" y="180"
        font-size="22"
        font-family="Segoe UI"
        fill="#C9D1D9">
        Full Stack Developer • AI Engineer
  </text>

  <text x="92" y="215"
        font-size="20"
        font-family="Segoe UI"
        fill="#8B949E">
        React • Next.js • Node.js • AI Agents • GenAI
  </text>

  <rect
      x="90"
      y="245"
      width="210"
      height="46"
      rx="23"
      fill="url(#yellow)"
      filter="url(#glow)"
  />

  <text
      x="132"
      y="274"
      font-size="18"
      font-family="Segoe UI"
      font-weight="700"
      fill="#111111">
      Let's Build 🚀
  </text>

  <text
      x="930"
      y="145"
      font-size="95"
      font-family="Segoe UI Emoji">
      🤖
  </text>
</svg>
